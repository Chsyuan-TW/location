<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水表 GPS 定位導航系統</title>
    <style>
        :root {
            /* 針對大太陽戶外微調：高對比度顏色 */
            --bg-color: #FFFFFF;
            --card-bg: #F0F4F8;
            --text-main: #000000; /* 純黑字體防陽光反光 */
            --text-muted: #333333;
            --primary-blue: #0056B3; /* 深藍色高對比 */
            --nav-green: #1E7E34; /* 深綠色導航鈕 */
            --danger-red: #D9534F; /* 警示紅色 */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-text-size-adjust: 100%;
        }

        /* 固定頂部搜尋列：加大、加深邊框 */
        .header-sticky {
            position: sticky;
            top: 0;
            background: #FFFFFF;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 100;
        }

        /* 💡 搜尋方塊外容器，用來精準定位內嵌的 X 按鈕 */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-box {
            width: 100%;
            padding: 16px 50px 16px 16px; /* 右邊預留 50px 給 X 按鈕，字絕對不會重疊 */
            font-size: 20px; /* 大太陽下字體加大 */
            font-weight: bold;
            box-sizing: border-box;
            border: 3px solid var(--primary-blue); /* 醒目的深藍粗邊框 */
            border-radius: 12px;
            color: #000;
        }

        /* 💡 超大好點擊的 ✕ 清除按鈕 */
        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 26px;
            color: #999;
            cursor: pointer;
            display: none; /* 預設隱藏，有字才出現 */
            padding: 10px; /* 加大手機大拇指盲點的感應範圍 */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .clear-btn:active {
            color: var(--danger-red); /* 點擊時變紅色反饋 */
        }

        /* 資訊看板 */
        .info-banner {
            background: #E6F0FA;
            padding: 14px;
            margin: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #B3D1F2;
        }

        /* 搜尋結果列表區 */
        .result-container {
            padding: 0 15px 30px 15px;
        }

        .no-data {
            text-align: center;
            color: #666;
            padding: 4px 0;
            font-size: 18px;
            font-weight: bold;
        }

        /* 定位卡片：大字體、大按鈕 */
        .location-card {
            background: var(--card-bg);
            border: 2px solid #D0D9E0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card-row {
            margin-bottom: 10px;
            font-size: 18px;
        }

        /* 💡 這裡可以自由調整「水號」的字體大小 */
        .water-text {
            font-size: 36px;       /* 👈 水號大小改這裡 */
            font-weight: bold;
            color: #000000;
        }

        /* 💡 這裡可以自由調整「表號」的字體大小 */
        .meter-text {
            font-size: 48px;       /* 👈 表號大小改這裡 */
            font-weight: 900;
            color: var(--primary-blue);
        }

        .label {
            font-weight: bold;
            color: #444;
            display: inline-block;
            width: 70px;
        }

        .value {
            font-weight: 900; /* 超粗體方便辨識 */
            color: #000;
        }

        /* Google 導航大按鈕 */
        .nav-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            background-color: var(--nav-green);
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .nav-button:active {
            background-color: #145523;
        }

        .nav-icon {
            margin-right: 10px;
            font-size: 24px;
        }

        /* 無定位警示區區塊 */
        .no-gps-warning {
            margin-top: 15px;
            padding: 15px;
            background-color: #FDF2F2;
            border: 2px solid var(--danger-red);
            color: var(--danger-red);
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border-radius: 12px;
        }
    </style>
</head>

    <div class="header-sticky">

    </div>

    // 控制「✕」按鈕的顯現時機：只要框內有輸入字元就顯示
    if (inputEl.value.length > 0) {
        clearBtn.style.display = 'block';
    } else {
        clearBtn.style.display = 'none';
    }
    
    if (!query) {
        container.innerHTML = '<div class="no-data">請在上方輸入表號進行搜尋...</div>';
        return;
    }

    // 記憶體高效篩選
    const filtered = myGpsRecords.filter(item => {
        return item["表號"] && String(item["表號"]).toLowerCase().includes(query);
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-data">❌ 找不到符合的表號</div>';
        return;
    }

    let html = '';
    const displayLimit = Math.min(filtered.length, 50); // 限制單次渲染數量，防手機畫面卡頓
    
    for (let i = 0; i < displayLimit; i++) {
        const item = filtered[i];
        
        // 檢查中文欄位「經度」與「緯度」
        const hasGps = item["經度"] && item["緯度"] && parseFloat(item["經度"]) !== 0 && parseFloat(item["緯度"]) !== 0;

        // 💡 關鍵修正：在這裡精準套用 water-text 與 meter-text 的加大外殼，這樣設定的大小才會真正亮起來！
        html += `
            <div class="location-card">
                <div class="card-row">
                    <span class="label">水號：</span>
                    <span class="water-text">${item["水號"] || '無資料'}</span>
                </div>
                <div class="card-row">
                    <span class="label">表號：</span>
                    <span class="meter-text">${item["表號"] || '無資料'}</span>
                </div>
                <div class="card-row">
                    <span class="label">經度：</span>
                    <span class="value">${hasGps ? item["經度"] : '無資料'}</span>
                </div>
                <div class="card-row">
                    <span class="label">緯度：</span>
                    <span class="value">${hasGps ? item["緯度"] : '無資料'}</span>
                </div>
        `;

        if (hasGps) {
            // 完美喚醒手機 Google Map App
            const googleMapUrl = `https://www.google.com/maps/search/?api=1&query=${item["緯度"]},${item["經度"]}`;
            html += `
                <a href="${googleMapUrl}" target="_blank" class="nav-button">
                    <span class="nav-icon">📍</span> 開啟 Google 地圖導航
                </a>
            `;
        } else {
            // 沒有定位資料：顯示高對比紅色警示文字
            html += `
                <div class="no-gps-warning">
                    ⚠️ 無定位資料，請洽服務所
                </div>
            `;
        }

        html += `</div>`; 
    }
    
    if (filtered.length > 50) {
        html += `<div style="text-align:center;color:#666;font-weight:bold;padding:10px;">⚠ 已省略後續 ${filtered.length - 50} 筆，請輸入更精確的表號</div>`;
    }
    
    container.innerHTML = html;
}

// --- 3. 💡 一鍵清空輸入功能 ---
function clearSearch() {
    const inputEl = document.getElementById('searchInput');
    inputEl.value = ''; // 清空文字框
    handleSearch();     // 觸發搜尋刷新（這會自動隱藏 X 鈕並回歸初始提示狀態）
    inputEl.focus();    // 清除後讓游標自動重新鎖定在輸入框，方便直接打下一筆
}
</script>
</body>
</html>
