<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水表 GPS 定位導航系統</title>
    <style>
        :root {
            /* 針對大太陽戶外微調：高對比度顏色 */
            --bg-color: #FFFFFF;
            --card-bg: #F0F4F8;
            --text-main: #000000; /* 純黑字體防陽光反光 */
            --text-muted: #333333;
            --primary-blue: #0056B3; /* 深藍色高對比 */
            --nav-green: #1E7E34; /* 深綠色導航鈕 */
            --danger-red: #D9534F; /* 警示紅色 */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-text-size-adjust: 100%;
        }

        /* 固定頂部搜尋列：加大、加深邊框 */
        .header-sticky {
            position: sticky;
            top: 0;
            background: #FFFFFF;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 100;
        }

        /* 💡 搜尋方塊外容器，用來精準定位內嵌的 X 按鈕 */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-box {
            width: 100%;
            padding: 16px 50px 16px 16px; /* 右邊預留 50px 給 X 按鈕，字絕對不會重疊 */
            font-size: 20px; /* 大太陽下字體加大 */
            font-weight: bold;
            box-sizing: border-box;
            border: 3px solid var(--primary-blue); /* 醒目的深藍粗邊框 */
            border-radius: 12px;
            color: #000;
        }

        /* 💡 超大好點擊的 ✕ 清除按鈕 */
        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 26px;
            color: #999;
            cursor: pointer;
            display: none; /* 預設隱藏，有字才出現 */
            padding: 10px; /* 加大手機大拇指盲點的感應範圍 */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .clear-btn:active {
            color: var(--danger-red); /* 點擊時變紅色反饋 */
        }

        /* 資訊看板 */
        .info-banner {
            background: #E6F0FA;
            padding: 14px;
            margin: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #B3D1F2;
        }

        /* 搜尋結果列表區 */
        .result-container {
            padding: 0 15px 30px 15px;
        }

        .no-data {
            text-align: center;
            color: #666;
            padding: 4px 0;
            font-size: 18px;
            font-weight: bold;
        }

        /* 定位卡片：大字體、大按鈕 */
        .location-card {
            background: var(--card-bg);
            border: 2px solid #D0D9E0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card-row {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .label {
            font-weight: bold;
            color: #444;
            display: inline-block;
            width: 70px;
        }

        .value {
            font-weight: 900; /* 超粗體方便辨識 */
            color: #000;
        }

        /* Google 導航大按鈕 */
        .nav-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            background-color: var(--nav-green);
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .nav-button:active {
            background-color: #145523;
        }

        .nav-icon {
            margin-right: 10px;
            font-size: 24px;
        }

        /* 無定位警示區區塊 */
        .no-gps-warning {
            margin-top: 15px;
            padding: 15px;
            background-color: #FDF2F2;
            border: 2px solid var(--danger-red);
            color: var(--danger-red);
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="請輸入關鍵字模糊搜尋表號..." oninput="handleSearch()">
            <div id="clearSearchBtn" class="clear-btn" onclick="clearSearch()">✕</div>
        </div>
    </div>

    <div class="info-banner">
        系統資料狀態: 目前已載入 <span id="recordCount" style="color:var(--primary-blue); font-size:18px;">0</span> 戶定位資料
    </div>

    <div class="result-container" id="resultContainer">
        <div class="no-data">請在上方輸入表號進行搜尋...</div>
    </div>

<script>
// --- 1. 💡 終極方案：直接把資料寫在陣列中，繞過所有手機資料庫權限限制 ---
const myGpsRecords = [
    // ↓↓↓ 請直接在此處貼上您的中文欄位真實資料，格式例如： ↓↓↓
    // { "水號": "11023456789", "表號": "M77889900", "經度": 120.245678, "緯度": 23.184321 },

        {"水號":"6C560010075","表號":"107B378311","經度":"120.3545683","緯度":"23.22435332"},{"水號":"6C560010101","表號":"107B378312","經度":"120.3544306","緯度":"23.2240785"},{"水號":"6C560014001","表號":"107B378313","經度":"120.3543724","緯度":"23.2244154"},{"水號":"6C560017201","表號":"107B378314","經度":"120.3545288","緯度":"23.22472701"},{"水號":"6C560018121","表號":"107B378315","經度":"120.3545945","緯度":"23.22508041"},{"水號":"6C56001819K","表號":"107B378316","經度":"120.3546604","緯度":"23.22497711"},{"水號":"6C560020151","表號":"107B378317","經度":"120.3542018","緯度":"23.2248228"},{"水號":"6C560020298","表號":"107B378318","經度":"120.3549537","緯度":"23.22579061"},{"水號":"6C560020350","表號":"107B526982","經度":"120.3538561","緯度":"23.22421565"},{"水號":"6C560020586","表號":"107B378319","經度":"120.3535317","緯度":"23.2245124"},{"水號":"6C560020591","表號":"107B378320","經度":"120.3535227","緯度":"23.22452554"},{"水號":"6C560023016","表號":"107B378321","經度":"120.3533347","緯度":"23.2247449"},{"水號":"6C560030112","表號":"107B378322","經度":"120.3536603","緯度":"23.22536494"},{"水號":"6C560032104","表號":"107B378323","經度":"120.3538917","緯度":"23.22524358"},{"水號":"6C560037212","表號":"107B378324","經度":"120.3531558","緯度":"23.22584903"},{"水號":"6C560037359","表號":"107B378325","經度":"120.3528958","緯度":"23.22532627"},{"水號":"6C560039005","表號":"107B378326","經度":"120.353./***_**_SHORTENED_**/":"23.21455476"}
];

// 網頁初始化載入
window.onload = function() {
    document.getElementById('recordCount').innerText = myGpsRecords.length;
    if (myGpsRecords.length === 0) {
        document.getElementById('recordCount').innerText = "0 (代碼中尚未偵測到貼入資料)";
    }
};

// --- 2. 模糊搜尋「表號」欄位（直接在記憶體中高效過濾） ---
function handleSearch() {
    const inputEl = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    const query = inputEl.value.trim().toLowerCase();
    const container = document.getElementById('resultContainer');
    
    // 💡 控制「✕」按鈕的顯現時機：只要框內有輸入字元就顯示
    if (inputEl.value.length > 0) {
        clearBtn.style.display = 'block';
    } else {
        clearBtn.style.display = 'none';
    }
    
    if (!query) {
        container.innerHTML = '<div class="no-data">請在上方輸入表號進行搜尋...</div>';
        return;
    }

    // 記憶體高效篩選
    const filtered = myGpsRecords.filter(item => {
        return item["表號"] && String(item["表號"]).toLowerCase().includes(query);
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-data">❌ 找不到符合的表號</div>';
        return;
    }

    let html = '';
    const displayLimit = Math.min(filtered.length, 50); // 限制單次渲染數量，防手機畫面卡頓
    
    for (let i = 0; i < displayLimit; i++) {
        const item = filtered[i];
        
        // 檢查中文欄位「經度」與「緯度」
        const hasGps = item["經度"] && item["緯度"] && parseFloat(item["經度"]) !== 0 && parseFloat(item["緯度"]) !== 0;

        html += `
            <div class="location-card">
                <div class="card-row"><span class="label">水號：</span><span class="value">${item["水號"] || '無資料'}</span></div>
                <div class="card-row"><span class="label">表號：</span><span class="value" style="color:var(--primary-blue); font-size:22px;">${item["表號"] || '無資料'}</span></div>
                <div class="card-row"><span class="label">經度：</span><span class="value">${hasGps ? item["經度"] : '無資料'}</span></div>
                <div class="card-row"><span class="label">緯度：</span><span class="value">${hasGps ? item["緯度"] : '無資料'}</span></div>
        `;

        if (hasGps) {
            // 💡 修正引號與格式，100% 完美喚醒手機 Google Map App
            const googleMapUrl = `http://googleusercontent.com/maps.google.com/?q=${item["緯度"]},${item["經度"]}`;
            html += `
                <a href="${googleMapUrl}" target="_blank" class="nav-button">
                    <span class="nav-icon">📍</span> 開啟 Google 地圖導航
                </a>
            `;
        } else {
            // 沒有定位資料：顯示高對比紅色警示文字
            html += `
                <div class="no-gps-warning">
                    ⚠️ 無定位資料，請洽服務所
                </div>
            `;
        }

        html += `</div>`; 
    }
    
    if (filtered.length > 50) {
        html += `<div style="text-align:center;color:#666;font-weight:bold;padding:10px;">⚠ 已省略後續 ${filtered.length - 50} 筆，請輸入更精確的表號</div>`;
    }
    
    container.innerHTML = html;
}

// --- 3. 💡 一鍵清空輸入功能 ---
function clearSearch() {
    const inputEl = document.getElementById('searchInput');
    inputEl.value = ''; // 清空文字框
    handleSearch();     // 觸發搜尋刷新（這會自動隱藏 X 鈕並回歸初始提示狀態）
    inputEl.focus();    // 清除後讓游標自動重新鎖定在輸入框，方便直接打下一筆
}
</script>
</body>
</html>
